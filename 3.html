<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6</title>
</head>
<body>

    <h1>TV Series Search</h1>

    <form id="search-form" action="https://api.tvmaze.com/search/shows">
        <input id="query" name="q" type="text">
        <input type="submit" value="Search">
    </form>

    <div id="results"></div>

<script>
'use strict';

const searchForm = document.querySelector('#search-form');
const resultsContainer = document.querySelector('#results');

searchForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    resultsContainer.innerHTML = '';

    const query = document.querySelector('#query').value;

    try {
        const response = await fetch(`https://api.tvmaze.com/search/shows?q=${query}`);
        const data = await response.json();

        data.forEach((tvShow) => {
            const article = document.createElement('article');

            // Name
            const title = document.createElement('h2');
            title.textContent = tvShow.show.name;

            // URL
            const link = document.createElement('a');
            link.href = tvShow.show.url;
            link.target = "_blank";
            link.textContent = tvShow.show.url;

            // Image (with optional chaining)
            const img = document.createElement('img');
            img.src = tvShow.show.image?.medium || '';
            img.alt = tvShow.show.name;

            // Summary (must be div, not p)
            const summaryDiv = document.createElement('div');
            summaryDiv.innerHTML = tvShow.show.summary;

            // Append in correct structure
            article.appendChild(title);
            article.appendChild(link);
            article.appendChild(img);
            article.appendChild(summaryDiv);

            resultsContainer.appendChild(article);
        });

    } catch (error) {
        console.error('Error fetching data:', error);
    }
});
</script>

</body>
</html>
