<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tehtävä3</title>
</head>
<body>

    <h1>TV haku</h1>

    <form action="https://api.tvmaze.com/search/shows">
        <input id="query" name="q" type="text">
        <input type="submit" value="Search">
    </form>

</body>
<script>
'use strict';

const searchForm = document.querySelector('#search-form');
const resultsContainer = document.querySelector('#results');

searchForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    resultsContainer.innerHTML = '';

    const valueFromInput = document.querySelector('#query').value;

    try {
        const response = await fetch(`https://api.tvmaze.com/search/shows?q=${valueFromInput}`);
        const data = await response.json();

        data.forEach((tvShow) => {
            const article = document.createElement('article');

            const title = document.createElement('h2');
            title.textContent = tvShow.show.name;

            const link = document.createElement('a');
            link.href = tvShow.show.url;
            link.target = "_blank";
            link.textContent = "Asiat";

            const img = document.createElement('img');
            img.src = tvShow.show.image?.medium || 'https://via.placeholder.com/210x295?text=No+Image';
            img.alt = tvShow.show.name;

            const summaryDiv = document.createElement('div');
            summaryDiv.innerHTML = tvShow.show.summary;

            article.appendChild(title);
            article.appendChild(img);
            article.appendChild(link);
            article.appendChild(summaryDiv);

            resultsContainer.appendChild(article);
        });

    } catch (error) {
        console.error('Ei toimi', error);
    }
});


</script>
</html>
